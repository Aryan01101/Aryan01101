<svg width="80" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .panda-icon { animation: float 3s ease-in-out infinite; }
    </style>
  </defs>

  <g class="panda-icon">
    <!-- Simplified geometric panda -->
    <!-- Ears -->
    <circle cx="20" cy="20" r="12" fill="#000000"/>
    <circle cx="60" cy="20" r="12" fill="#000000"/>

    <!-- Head -->
    <circle cx="40" cy="40" r="28" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

    <!-- Eye patches -->
    <ellipse cx="30" cy="38" rx="8" ry="11" fill="#000000"/>
    <ellipse cx="50" cy="38" rx="8" ry="11" fill="#000000"/>

    <!-- Eyes with cyan highlight -->
    <circle cx="30" cy="38" r="4" fill="#FFFFFF"/>
    <circle cx="50" cy="38" r="4" fill="#FFFFFF"/>
    <circle cx="31" cy="37" r="2" fill="#000000"/>
    <circle cx="51" cy="37" r="2" fill="#000000"/>
    <circle cx="29" cy="36" r="1" fill="#00D9FF"/>
    <circle cx="49" cy="36" r="1" fill="#00D9FF"/>

    <!-- Nose -->
    <ellipse cx="40" cy="48" rx="5" ry="6" fill="#000000"/>

    <!-- Mouth -->
    <path d="M 40,52 Q 35,54 32,53" stroke="#000000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 40,52 Q 45,54 48,53" stroke="#000000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
