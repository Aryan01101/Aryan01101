<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes eatBamboo {
        0%, 100% { transform: rotate(-5deg); }
        50% { transform: rotate(5deg); }
      }
      @keyframes blink {
        0%, 90%, 100% { opacity: 1; }
        95% { opacity: 0; }
      }
      .bamboo-in-hand { animation: eatBamboo 2s ease-in-out infinite; transform-origin: center; }
      .eye { animation: blink 4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#F5F5F5"/>

  <!-- Shadow -->
  <ellipse cx="200" cy="350" rx="80" ry="15" fill="#000000" opacity="0.1"/>

  <!-- Sitting panda body -->
  <g transform="translate(200, 200)">
    <!-- Back legs -->
    <ellipse cx="-40" cy="80" rx="35" ry="45" fill="#000000"/>
    <ellipse cx="40" cy="80" rx="35" ry="45" fill="#000000"/>
    <ellipse cx="-40" cy="110" rx="30" ry="20" fill="#FFFFFF"/>
    <ellipse cx="40" cy="110" rx="30" ry="20" fill="#FFFFFF"/>

    <!-- Body -->
    <ellipse cx="0" cy="30" rx="75" ry="95" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>

    <!-- Belly patch -->
    <ellipse cx="0" cy="40" rx="50" ry="60" fill="#F8F8F8"/>

    <!-- Arms -->
    <ellipse cx="-55" cy="20" rx="28" ry="70" fill="#000000" transform="rotate(-15 -55 20)"/>
    <ellipse cx="55" cy="20" rx="28" ry="70" fill="#000000" transform="rotate(15 55 20)"/>

    <!-- Paws -->
    <ellipse cx="-60" cy="70" rx="22" ry="18" fill="#FFFFFF"/>
    <ellipse cx="60" cy="70" rx="22" ry="18" fill="#FFFFFF"/>

    <!-- Paw pads -->
    <g opacity="0.7">
      <circle cx="-60" cy="75" r="4" fill="#000000"/>
      <circle cx="-70" cy="68" r="3" fill="#000000"/>
      <circle cx="-50" cy="68" r="3" fill="#000000"/>
      <circle cx="60" cy="75" r="4" fill="#000000"/>
      <circle cx="70" cy="68" r="3" fill="#000000"/>
      <circle cx="50" cy="68" r="3" fill="#000000"/>
    </g>

    <!-- Head -->
    <circle cx="0" cy="-40" r="60" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>

    <!-- Ears -->
    <circle cx="-40" cy="-70" r="25" fill="#000000"/>
    <circle cx="40" cy="-70" r="25" fill="#000000"/>
    <circle cx="-40" cy="-68" r="12" fill="#1A1A1A"/>
    <circle cx="40" cy="-68" r="12" fill="#1A1A1A"/>

    <!-- Eye patches -->
    <ellipse cx="-20" cy="-45" rx="18" ry="24" fill="#000000"/>
    <ellipse cx="20" cy="-45" rx="18" ry="24" fill="#000000"/>

    <!-- Eyes -->
    <g class="eye">
      <circle cx="-20" cy="-45" r="8" fill="#FFFFFF"/>
      <circle cx="20" cy="-45" r="8" fill="#FFFFFF"/>
      <circle cx="-18" cy="-43" r="5" fill="#000000"/>
      <circle cx="22" cy="-43" r="5" fill="#000000"/>
      <!-- Shine -->
      <circle cx="-17" cy="-46" r="2" fill="#FFFFFF"/>
      <circle cx="23" cy="-46" r="2" fill="#FFFFFF"/>
    </g>

    <!-- Nose -->
    <ellipse cx="0" cy="-30" rx="10" ry="12" fill="#000000"/>

    <!-- Mouth -->
    <path d="M 0,-24 L 0,-15" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0,-15 Q -12,-10 -18,-8" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 0,-15 Q 12,-10 18,-8" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Bamboo in hand -->
    <g class="bamboo-in-hand" transform="translate(65, -10)">
      <rect x="0" y="0" width="8" height="90" rx="4" fill="#2D5016"/>
      <line x1="4" y1="0" x2="4" y2="90" stroke="#4A7C2B" stroke-width="1.5"/>
      <!-- Bamboo nodes -->
      <rect x="-2" y="20" width="12" height="3" rx="1.5" fill="#234010"/>
      <rect x="-2" y="50" width="12" height="3" rx="1.5" fill="#234010"/>
      <rect x="-2" y="80" width="12" height="3" rx="1.5" fill="#234010"/>
      <!-- Leaves -->
      <ellipse cx="8" cy="5" rx="15" ry="5" fill="#4A7C2B" transform="rotate(-30 8 5)"/>
      <ellipse cx="0" cy="10" rx="15" ry="5" fill="#3D6A23" transform="rotate(30 0 10)"/>
      <ellipse cx="8" cy="15" rx="12" ry="4" fill="#4A7C2B" transform="rotate(-20 8 15)"/>
    </g>
  </g>

  <!-- Decorative bamboo leaves around the panda -->
  <g opacity="0.3">
    <ellipse cx="50" cy="100" rx="25" ry="8" fill="#4A7C2B" transform="rotate(-45 50 100)"/>
    <ellipse cx="350" cy="120" rx="25" ry="8" fill="#3D6A23" transform="rotate(45 350 120)"/>
    <ellipse cx="80" cy="300" rx="20" ry="6" fill="#4A7C2B" transform="rotate(30 80 300)"/>
    <ellipse cx="330" cy="320" rx="20" ry="6" fill="#3D6A23" transform="rotate(-30 330 320)"/>
  </g>
</svg>
